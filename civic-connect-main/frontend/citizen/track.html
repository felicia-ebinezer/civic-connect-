<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Track Complaint — Civic Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue: #1D4ED8; --bg: #EFF6FF; --white: #fff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --green: #10b981; --yellow: #f59e0b; --red: #ef4444; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
  nav { background: var(--blue); color: white; padding: 0.9rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 999; }
  .nav-brand { display: flex; align-items: center; gap: 0.6rem; font-size: 1.1rem; font-weight: 800; text-decoration: none; color: white; }
  .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.88rem; font-weight: 500; margin-left: 1rem; }
  .nav-links a:hover { color: white; }
  /* MAIN */
  .main { max-width: 820px; margin: 2rem auto; padding: 0 1.5rem 4rem; }
  .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--blue); text-decoration: none; font-size: 0.88rem; font-weight: 600; margin-bottom: 1.5rem; }
  .back-link:hover { text-decoration: underline; }
  /* HEADER CARD */
  .header-card { background: var(--white); border-radius: 16px; padding: 1.75rem; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .complaint-id { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 0.4rem; }
  .complaint-title { font-size: 1.5rem; font-weight: 800; color: var(--text); margin-bottom: 0.5rem; }
  .complaint-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.3rem 0.75rem; border-radius: 999px; font-size: 0.78rem; font-weight: 700; }
  .badge-pending { background: #f1f5f9; color: var(--muted); }
  .badge-in_progress { background: #fef9c3; color: #854d0e; }
  .badge-resolved { background: #d1fae5; color: #064e3b; }
  .badge-high { background: #fef3c7; color: #92400e; }
  .badge-critical { background: #fee2e2; color: #991b1b; }
  .badge-medium { background: #fff7ed; color: #9a3412; }
  .badge-low { background: #f0fdf4; color: #166534; }
  .upvote-section { display: flex; flex-direction: column; align-items: center; }
  .upvote-btn { background: none; border: 2px solid var(--border); border-radius: 12px; padding: 0.6rem 1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.2rem; transition: all 0.2s; font-family: inherit; }
  .upvote-btn:hover, .upvote-btn.voted { border-color: var(--blue); background: #eff6ff; }
  .upvote-btn .thumb { font-size: 1.3rem; }
  .upvote-btn .count { font-size: 0.85rem; font-weight: 700; color: var(--blue); }
  /* PIPELINE */
  .pipeline-card { background: var(--white); border-radius: 16px; padding: 1.75rem; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
  .pipeline-title { font-size: 0.9rem; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1.5rem; }
  .pipeline { display: flex; flex-direction: column; gap: 0; }
  .stage { display: flex; gap: 1.25rem; position: relative; }
  .stage:not(:last-child)::after { content: ''; position: absolute; left: 19px; top: 40px; width: 2px; height: calc(100% - 8px); background: var(--border); z-index: 0; }
  .stage.done::after { background: var(--green); }
  .stage.active::after { background: linear-gradient(to bottom, var(--blue), var(--border)); }
  .stage-dot { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; z-index: 1; background: white; transition: all 0.3s; }
  .stage.done .stage-dot { border-color: var(--green); background: var(--green); color: white; }
  .stage.active .stage-dot { border-color: var(--blue); background: var(--blue); color: white; box-shadow: 0 0 0 6px #dbeafe; }
  .stage-content { padding-bottom: 1.75rem; padding-top: 0.35rem; flex: 1; }
  .stage-label { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
  .stage.done .stage-label, .stage.active .stage-label { color: var(--text); }
  .stage:not(.done):not(.active) .stage-label { color: var(--muted); }
  .stage-ts { font-size: 0.8rem; color: var(--muted); }
  .stage.done .stage-ts { color: var(--green); font-weight: 600; }
  .stage.active .stage-ts { color: var(--blue); font-weight: 600; }
  /* ETA */
  .eta-card { background: var(--white); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
  .eta-title { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; color: var(--text); }
  .eta-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.6rem; }
  .eta-row span:last-child { font-weight: 700; color: var(--text); }
  .eta-bar { background: var(--border); border-radius: 999px; height: 10px; overflow: hidden; }
  .eta-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width 1s ease; }
  /* PHOTO */
  .photo-card { background: var(--white); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
  .photo-card img { width: 100%; border-radius: 10px; max-height: 250px; object-fit: cover; }
  .photo-placeholder { background: #f1f5f9; border-radius: 10px; height: 120px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 2rem; }
  .loading { text-align: center; padding: 4rem; color: var(--muted); }
</style>
</head>
<body>
<nav>
  <a href="/citizen/dashboard.html" class="nav-brand">🏛️ Civic Connect</a>
  <div class="nav-links">
    <a href="/citizen/dashboard.html">Dashboard</a>
    <a href="/citizen/report.html">Report</a>
    <a href="/citizen/profile.html">Profile</a>
  </div>
</nav>

<div class="main">
  <a href="/citizen/dashboard.html" class="back-link">← Back to Dashboard</a>
  <div id="content"><div class="loading">Loading complaint...</div></div>
</div>

<script>
const token = localStorage.getItem('token');
const role = localStorage.getItem('role');
if (!token || role !== 'citizen') window.location.href = '/citizen/login.html';

const params = new URLSearchParams(location.search);
const id = params.get('id');
if (!id) window.location.href = '/citizen/dashboard.html';

const STAGES = [
  { emoji: '📥', label: 'Complaint Received' },
  { emoji: '🔍', label: 'Verified by Authority' },
  { emoji: '👷', label: 'Team Assembled' },
  { emoji: '🚛', label: 'Team Dispatched' },
  { emoji: '🔧', label: 'Work Started' },
  { emoji: '⚙️', label: 'Work Halfway Done' },
  { emoji: '🧪', label: 'Final Inspection' },
  { emoji: '✅', label: 'Issue Resolved' },
];

async function load() {
  try {
    const res = await fetch(`/complaints/${id}`, { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) throw new Error('Not found');
    const c = await res.json();
    render(c);
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="loading">Could not load complaint #${id}. <a href="/citizen/dashboard.html">Go back</a></div>`;
  }
}

function render(c) {
  const ts = c.stage_timestamps || {};
  const currentStage = c.current_stage;

  // ETA calculation
  const created = new Date(c.created_at);
  const now = new Date();
  const sla = c.sla_deadline ? new Date(c.sla_deadline) : null;
  const elapsedH = Math.floor((now - created) / 3600000);
  let pct = 0, etaText = '';
  if (sla) {
    const totalMs = sla - created;
    pct = Math.min(100, Math.max(0, Math.round(((now - created) / totalMs) * 100)));
    const remH = Math.max(0, Math.floor((sla - now) / 3600000));
    etaText = remH > 24 ? `${Math.floor(remH/24)}d ${remH%24}h remaining` : remH > 0 ? `${remH}h remaining` : 'SLA expired';
  }

  // Check upvote state
  const upvoteKey = `upvoted_${c.id}`;
  const hasVoted = localStorage.getItem(upvoteKey);

  document.getElementById('content').innerHTML = `
    <!-- Header -->
    <div class="header-card">
      <div>
        <div class="complaint-id">#${c.id} · ${new Date(c.created_at).toLocaleDateString()}</div>
        <div class="complaint-title">${c.category}</div>
        <div class="complaint-meta">
          <span class="badge badge-${c.status}">${c.status === 'in_progress' ? '🔄 In Progress' : c.status === 'resolved' ? '✅ Resolved' : '⏳ Pending'}</span>
          <span class="badge badge-${c.severity?.toLowerCase()}">${c.severity}</span>
          ${c.ai_detected ? '<span class="badge" style="background:#eff6ff;color:#1D4ED8">🤖 AI Detected ('+(c.ai_confidence||0)+'%)</span>' : ''}
          ${c.priority_boosted ? '<span class="badge" style="background:#fef9c3;color:#854d0e">⚡ Priority</span>' : ''}
        </div>
        <p style="margin-top:0.75rem;font-size:0.9rem;color:var(--muted);max-width:500px;">${c.description}</p>
      </div>
      <div class="upvote-section">
        <button class="upvote-btn ${hasVoted ? 'voted' : ''}" id="upvoteBtn" onclick="upvote(${c.id})">
          <span class="thumb">👍</span>
          <span class="count" id="upvoteCount">${c.upvotes}</span>
        </button>
        <div style="font-size:0.72rem;color:var(--muted);margin-top:0.3rem;">Upvote</div>
      </div>
    </div>

    ${c.photo_url ? `
    <div class="photo-card">
      <div style="font-size:0.85rem;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.75rem;">📷 Photo Evidence</div>
      <img src="${c.photo_url}" alt="Complaint photo" onerror="this.style.display='none'" />
    </div>` : ''}

    <!-- ETA -->
    <div class="eta-card">
      <div class="eta-title">⏱️ Resolution Progress</div>
      <div class="eta-row"><span>Stage</span><span>${currentStage} of 7 — ${STAGES[currentStage]?.label}</span></div>
      <div class="eta-row"><span>Time Elapsed</span><span>${elapsedH}h</span></div>
      <div class="eta-row"><span>Deadline</span><span>${sla ? sla.toLocaleDateString() : '—'}</span></div>
      ${etaText ? `<div class="eta-row"><span>ETA</span><span>${etaText}</span></div>` : ''}
      <div class="eta-bar" style="margin-top:0.75rem;">
        <div class="eta-fill" style="width:${currentStage === 7 ? 100 : pct}%"></div>
      </div>
      <div style="text-align:right;font-size:0.78rem;color:var(--muted);margin-top:0.3rem;">${currentStage === 7 ? '100' : pct}% of SLA used</div>
    </div>

    <!-- Pipeline -->
    <div class="pipeline-card">
      <div class="pipeline-title">📍 Resolution Pipeline</div>
      <div class="pipeline">
        ${STAGES.map((s, i) => {
          const done = i < currentStage;
          const active = i === currentStage;
          const tsVal = ts[String(i)];
          return `<div class="stage ${done ? 'done' : active ? 'active' : ''}">
            <div class="stage-dot">${done ? '✓' : active ? s.emoji : s.emoji}</div>
            <div class="stage-content">
              <div class="stage-label">${s.label}</div>
              <div class="stage-ts">${tsVal ? new Date(tsVal).toLocaleString() : (done || active) ? 'Completed' : 'Pending'}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;

  if (hasVoted) document.getElementById('upvoteBtn').disabled = true;
}

async function upvote(complaintId) {
  const key = `upvoted_${complaintId}`;
  if (localStorage.getItem(key)) return;
  try {
    const res = await fetch(`/complaints/${complaintId}/upvote`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token }
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem(key, '1');
      document.getElementById('upvoteCount').textContent = data.upvotes;
      document.getElementById('upvoteBtn').classList.add('voted');
      document.getElementById('upvoteBtn').disabled = true;
    } else {
      alert(data.detail || 'Could not upvote');
    }
  } catch {}
}

load();
</script>
</body>
</html>
