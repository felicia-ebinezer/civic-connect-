<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Vouchers — Civic Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue: #1D4ED8; --bg: #EFF6FF; --white: #fff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
  nav { background: var(--blue); color: white; padding: 0.9rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 999; }
  .nav-brand { display: flex; align-items: center; gap: 0.6rem; font-size: 1.1rem; font-weight: 800; text-decoration: none; color: white; }
  .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.88rem; font-weight: 500; margin-left: 1rem; }
  .nav-links a.active, .nav-links a:hover { color: white; }
  .main { max-width: 820px; margin: 2rem auto; padding: 0 1.5rem 4rem; }
  .page-title { font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 0.4rem; }
  .page-sub { color: var(--muted); margin-bottom: 2rem; }
  .vouchers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
  .voucher-card { background: var(--white); border-radius: 18px; padding: 1.75rem; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
  .voucher-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
  .voucher-card.active::before { background: linear-gradient(90deg, #1D4ED8, #10b981); }
  .voucher-card.expired::before { background: #e2e8f0; }
  .voucher-card.used::before { background: linear-gradient(90deg, #6b7280, #9ca3af); }
  .voucher-type { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 0.5rem; }
  .voucher-name { font-size: 1.15rem; font-weight: 800; color: var(--text); margin-bottom: 0.3rem; }
  .voucher-status { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.7rem; border-radius: 999px; font-size: 0.78rem; font-weight: 700; margin-bottom: 1rem; }
  .status-active { background: #d1fae5; color: #064e3b; }
  .status-expired { background: #f1f5f9; color: var(--muted); }
  .status-used { background: #fef2f2; color: #991b1b; }
  .qr-section { display: flex; justify-content: center; margin: 1rem 0; }
  .expires-row { font-size: 0.82rem; color: var(--muted); margin-top: 0.75rem; text-align: center; }
  .countdown { font-weight: 700; color: var(--blue); }
  .empty { text-align: center; padding: 4rem 2rem; }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
  .empty p { color: var(--muted); margin-bottom: 1.5rem; }
  .empty a { color: var(--blue); font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<nav>
  <a href="/citizen/dashboard.html" class="nav-brand">🏛️ Civic Connect</a>
  <div class="nav-links">
    <a href="/citizen/dashboard.html">Dashboard</a>
    <a href="/citizen/rewards.html">Rewards 🎁</a>
    <a href="/citizen/vouchers.html" class="active">Vouchers 🎫</a>
    <a href="/citizen/profile.html">Profile</a>
  </div>
</nav>

<div class="main">
  <div class="page-title">🎫 My Vouchers</div>
  <p class="page-sub">Your active and past bus pass vouchers</p>

  <div id="vouchersContainer">
    <div style="text-align:center;padding:3rem;color:var(--muted);">Loading vouchers...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script>
const token = localStorage.getItem('token');
const role = localStorage.getItem('role');
if (!token || role !== 'citizen') window.location.href = '/citizen/login.html';

async function load() {
  const res = await fetch('/citizen/vouchers', { headers: { Authorization: 'Bearer ' + token } });
  const vouchers = await res.json();
  const container = document.getElementById('vouchersContainer');

  if (!vouchers.length) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎫</div>
        <h3>No Vouchers Yet</h3>
        <p>Earn points and redeem them for free bus passes!</p>
        <a href="/citizen/rewards.html">Visit Rewards Store →</a>
      </div>`;
    return;
  }

  container.innerHTML = '<div class="vouchers-grid" id="vouchersGrid"></div>';
  const grid = document.getElementById('vouchersGrid');

  vouchers.forEach((v, i) => {
    const isActive = v.status === 'active';
    const label = v.type === 'bus_1day' ? '1-Day Bus Pass' : '7-Day Bus Pass';
    const expires = v.expires_at ? new Date(v.expires_at) : null;
    const now = new Date();
    let timeLeft = '';
    if (expires && isActive) {
      const ms = expires - now;
      if (ms > 0) {
        const h = Math.floor(ms / 3600000);
        const d = Math.floor(h / 24);
        timeLeft = d > 0 ? `${d}d ${h % 24}h left` : `${h}h left`;
      } else { timeLeft = 'Expired'; }
    }

    const div = document.createElement('div');
    div.className = `voucher-card ${v.status}`;
    div.innerHTML = `
      <div class="voucher-type">Bus Pass Voucher</div>
      <div class="voucher-name">🚌 ${label}</div>
      <span class="voucher-status status-${v.status}">
        ${v.status === 'active' ? '✅ Active' : v.status === 'used' ? '✓ Used' : '⏱ Expired'}
      </span>
      <div class="qr-section"><div id="qr_${i}"></div></div>
      <div style="text-align:center;font-size:0.75rem;color:var(--muted);margin-top:0.5rem;word-break:break-all;padding:0 0.5rem">${v.qr_code}</div>
      ${expires ? `
        <div class="expires-row">
          Expires: <span class="countdown">${expires.toLocaleString()}</span>
          ${timeLeft ? ` · ${timeLeft}` : ''}
        </div>` : ''}
    `;
    grid.appendChild(div);

    if (isActive) {
      new QRCode(document.getElementById(`qr_${i}`), {
        text: v.qr_code,
        width: 160, height: 160,
        colorDark: '#1D4ED8', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    } else {
      document.getElementById(`qr_${i}`).innerHTML = `<div style="width:160px;height:160px;background:#f1f5f9;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:2rem">🚌</div>`;
    }
  });
}

load();
</script>
</body>
</html>
