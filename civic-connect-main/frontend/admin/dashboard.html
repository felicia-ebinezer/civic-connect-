<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard — Civic Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --purple: #5b21b6; --bg: #f5f3ff; --white: #fff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
  nav { background: var(--purple); color: white; padding: 0.9rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 999; box-shadow: 0 2px 12px rgba(91,33,182,0.3); }
  .nav-brand { display: flex; align-items: center; gap: 0.6rem; font-size: 1.1rem; font-weight: 800; text-decoration: none; color: white; }
  .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.88rem; font-weight: 500; margin-left: 1rem; }
  .nav-links a.active, .nav-links a:hover { color: white; }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .nav-user { display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: rgba(255,255,255,0.85); }
  .logout-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.82rem; cursor: pointer; }
  .logout-btn:hover { background: rgba(255,255,255,0.25); }
  /* MAIN */
  .main { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  .page-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.75rem; }
  .page-title { font-size: 1.5rem; font-weight: 800; color: var(--text); }
  /* STATS BAR */
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
  .stat-card { background: var(--white); border-radius: 14px; padding: 1.25rem 1.5rem; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .stat-card.warn { border-left: 4px solid #ef4444; }
  .stat-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; letter-spacing: 0.4px; }
  .stat-value { font-size: 1.8rem; font-weight: 900; color: var(--text); }
  .stat-value.red { color: #ef4444; }
  .stat-value.green { color: #10b981; }
  .stat-value.yellow { color: #f59e0b; }
  .stat-value.purple { color: var(--purple); }
  /* FILTERS */
  .filters { background: var(--white); border-radius: 14px; padding: 1.25rem; border: 1px solid var(--border); margin-bottom: 1.25rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
  .filter-select, .filter-search { padding: 0.6rem 0.9rem; border: 2px solid var(--border); border-radius: 10px; font-size: 0.85rem; font-family: inherit; color: var(--text); outline: none; background: #f8fafc; transition: border-color 0.2s; }
  .filter-select:focus, .filter-search:focus { border-color: var(--purple); }
  .filter-search { flex: 1; min-width: 180px; }
  .filter-btn { background: var(--purple); color: white; border: none; border-radius: 10px; padding: 0.6rem 1.25rem; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
  .filter-btn.clear { background: #f1f5f9; color: var(--muted); }
  /* TABLE */
  .table-card { background: var(--white); border-radius: 14px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; }
  .table-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #faf5ff; padding: 0.9rem 1.25rem; text-align: left; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 0.9rem 1.25rem; font-size: 0.88rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #faf5ff; }
  .complaint-link { color: var(--text); text-decoration: none; font-weight: 700; }
  .complaint-link:hover { color: var(--purple); text-decoration: underline; }
  .badge { display: inline-flex; align-items: center; padding: 0.25rem 0.65rem; border-radius: 999px; font-size: 0.73rem; font-weight: 700; white-space: nowrap; }
  .badge-pending { background: #f1f5f9; color: var(--muted); }
  .badge-in_progress { background: #fef9c3; color: #854d0e; }
  .badge-resolved { background: #d1fae5; color: #064e3b; }
  .badge-high { background: #fef3c7; color: #92400e; }
  .badge-critical { background: #fee2e2; color: #991b1b; }
  .badge-medium { background: #fff7ed; color: #9a3412; }
  .badge-low { background: #f0fdf4; color: #166534; }
  .badge-sla { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  .upvote { color: var(--muted); font-size: 0.8rem; }
  .days-old { font-size: 0.8rem; color: var(--muted); }
  .days-old.warn { color: #ef4444; font-weight: 700; }
  .priority-star { color: #f59e0b; font-size: 0.85rem; }
  .loading { text-align: center; padding: 3rem; color: var(--muted); }
  @media (max-width: 900px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } .nav-links { display: none; } }
  @media (max-width: 600px) { table { display: block; overflow-x: auto; } }
</style>
</head>
<body>
<nav>
  <a href="/admin/dashboard.html" class="nav-brand">🏛️ Civic Connect <span style="font-size:0.7rem;background:rgba(255,255,255,0.2);padding:0.2rem 0.5rem;border-radius:6px;margin-left:0.4rem">ADMIN</span></a>
  <div class="nav-links">
    <a href="/admin/dashboard.html" class="active">Dashboard</a>
    <a href="/admin/map.html">Map</a>
    <a href="/admin/workers.html">Workers</a>
    <a href="/admin/analytics.html">Analytics</a>
  </div>
  <div class="nav-right">
    <div class="nav-user">👤 <span id="navName">Admin</span></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <div class="page-title">📋 All Complaints</div>
    <div style="font-size:0.85rem;color:var(--muted)">Last updated: <span id="lastUpdated">—</span></div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value purple" id="sInProgress">—</div></div>
    <div class="stat-card warn"><div class="stat-label">SLA Breached</div><div class="stat-value red" id="sSLA">—</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value yellow" id="sPending">—</div></div>
    <div class="stat-card"><div class="stat-label">Resolved</div><div class="stat-value green" id="sResolved">—</div></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input class="filter-search" type="text" id="searchInput" placeholder="Search by ID or location..." oninput="applyFilters()" />
    <select class="filter-select" id="statusFilter" onchange="applyFilters()">
      <option value="">All Status</option>
      <option value="pending">Pending</option>
      <option value="in_progress">In Progress</option>
      <option value="resolved">Resolved</option>
    </select>
    <select class="filter-select" id="categoryFilter" onchange="applyFilters()">
      <option value="">All Categories</option>
      <option>Pothole</option><option>Garbage</option><option>Street Light</option>
      <option>Water Leakage</option><option>Road Damage</option>
    </select>
    <select class="filter-select" id="severityFilter" onchange="applyFilters()">
      <option value="">All Severity</option>
      <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
    </select>
    <button class="filter-btn clear" onclick="clearFilters()">✕ Clear</button>
  </div>

  <div class="table-card">
    <div class="table-header">
      <span id="countLabel">Loading...</span>
    </div>
    <div id="tableContainer"><div class="loading">Loading complaints...</div></div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
const role = localStorage.getItem('role');
if (!token || role !== 'admin') window.location.href = '/admin/login.html';

document.getElementById('navName').textContent = localStorage.getItem('name') || 'Admin';

let allComplaints = [];
const now = new Date();

async function load() {
  document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
  try {
    const [compRes, analyticsRes] = await Promise.all([
      fetch('/complaints', { headers: { Authorization: 'Bearer ' + token } }),
      fetch('/admin/analytics', { headers: { Authorization: 'Bearer ' + token } })
    ]);
    allComplaints = await compRes.json();
    const analytics = await analyticsRes.json();

    document.getElementById('sInProgress').textContent = analytics.in_progress;
    document.getElementById('sSLA').textContent = analytics.sla_breached;
    document.getElementById('sPending').textContent = analytics.pending;
    document.getElementById('sResolved').textContent = analytics.resolved;

    applyFilters();
  } catch (err) {
    document.getElementById('tableContainer').innerHTML = '<div class="loading">Failed to load. <a href="#" onclick="load()">Retry</a></div>';
  }
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const category = document.getElementById('categoryFilter').value;
  const severity = document.getElementById('severityFilter').value;

  let list = allComplaints.filter(c => {
    const matchSearch = !search || String(c.id).includes(search) ||
      (c.latitude && c.latitude.toString().includes(search)) ||
      (c.category && c.category.toLowerCase().includes(search));
    const matchStatus = !status || c.status === status;
    const matchCat = !category || c.category === category;
    const matchSev = !severity || c.severity === severity;
    return matchSearch && matchStatus && matchCat && matchSev;
  });

  document.getElementById('countLabel').textContent = `Showing ${list.length} of ${allComplaints.length} complaints`;
  renderTable(list);
}

function clearFilters() {
  ['searchInput','statusFilter','categoryFilter','severityFilter'].forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName === 'SELECT') el.value = '';
    else el.value = '';
  });
  applyFilters();
}

function renderTable(list) {
  const container = document.getElementById('tableContainer');
  if (!list.length) {
    container.innerHTML = '<div class="loading">No complaints match the current filters.</div>';
    return;
  }
  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Category</th><th>Severity</th><th>Location</th>
          <th>Status</th><th>Stage</th><th>Upvotes</th><th>Age</th><th>SLA</th>
        </tr>
      </thead>
      <tbody>
        ${list.map(c => {
          const daysOld = Math.floor((now - new Date(c.created_at)) / 86400000);
          const sla = c.sla_deadline ? new Date(c.sla_deadline) : null;
          const slaBreached = sla && sla < now && c.status !== 'resolved';
          const slaRemH = sla ? Math.max(0, Math.floor((sla - now) / 3600000)) : null;
          return `<tr>
            <td>
              <a href="/admin/complaint.html?id=${c.id}" class="complaint-link">
                #${c.id}${c.priority_boosted ? ' <span class="priority-star">⚡</span>' : ''}
              </a>
            </td>
            <td>${c.category}${c.ai_detected ? ' <span style="font-size:0.72rem;color:#1D4ED8">🤖</span>' : ''}</td>
            <td><span class="badge badge-${c.severity?.toLowerCase()}">${c.severity}</span></td>
            <td style="font-size:0.8rem;color:var(--muted)">${c.latitude ? c.latitude.toFixed(3) + ', ' + c.longitude.toFixed(3) : '—'}</td>
            <td><span class="badge badge-${c.status}">${c.status === 'in_progress' ? '🔄 In Progress' : c.status === 'resolved' ? '✅ Resolved' : '⏳ Pending'}</span></td>
            <td style="font-size:0.82rem;font-weight:600">Stage ${c.current_stage}/7</td>
            <td class="upvote">👍 ${c.upvotes}</td>
            <td class="days-old ${daysOld > 5 ? 'warn' : ''}">${daysOld}d</td>
            <td>${slaBreached ? '<span class="badge badge-sla">⛔ Breached</span>' : sla ? `<span style="font-size:0.78rem;color:var(--muted)">${slaRemH > 24 ? Math.floor(slaRemH/24)+'d' : slaRemH+'h'}</span>` : '—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function logout() { localStorage.clear(); window.location.href = '/'; }

load();
setInterval(load, 60000);
</script>
</body>
</html>
