<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Authority Login — Civic Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --purple: #7c3aed; --bg: #f5f3ff; --white: #fff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --error: #ef4444; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  body::before { content: ''; position: fixed; width: 500px; height: 500px; background: var(--purple); border-radius: 50%; filter: blur(100px); opacity: 0.1; top: -200px; left: -200px; pointer-events: none; }
  .card { background: var(--white); border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(124,58,237,0.15); border: 1px solid var(--border); position: relative; z-index: 1; }
  .card::before { content: ''; display: block; height: 4px; background: linear-gradient(90deg, #7c3aed, #a855f7); border-radius: 4px; margin: -2.5rem -2.5rem 2rem -2.5rem; border-radius: 24px 24px 0 0; }
  .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--purple); text-decoration: none; font-size: 0.85rem; font-weight: 500; margin-bottom: 1.5rem; }
  .back-link:hover { text-decoration: underline; }
  .badge { display: inline-flex; align-items: center; gap: 0.4rem; background: #f5f3ff; color: var(--purple); font-size: 0.75rem; font-weight: 700; padding: 0.3rem 0.75rem; border-radius: 999px; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.5px; }
  h1 { font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.75rem; }
  .form-group { margin-bottom: 1.1rem; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
  input { width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--border); border-radius: 10px; font-size: 0.95rem; font-family: inherit; color: var(--text); transition: border-color 0.2s; outline: none; background: #f8fafc; }
  input:focus { border-color: var(--purple); background: white; }
  .btn { width: 100%; padding: 0.9rem; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; box-shadow: 0 4px 16px rgba(124,58,237,0.35); }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.45); }
  .btn:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
  .notice { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 0.75rem 1rem; font-size: 0.83rem; color: #92400e; margin-bottom: 1.5rem; display: flex; gap: 0.5rem; align-items: flex-start; }
  .alert { padding: 0.75rem 1rem; border-radius: 10px; font-size: 0.87rem; margin-bottom: 1rem; display: none; }
  .alert-error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .demo-creds { background: #f5f3ff; border-radius: 10px; padding: 0.8rem 1rem; font-size: 0.82rem; color: #6d28d9; margin-top: 1rem; }
  .demo-creds strong { display: block; margin-bottom: 0.3rem; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <a href="/" class="back-link">← Back to Home</a>
  <span class="badge">🏛️ Authority Portal</span>
  <h1>Authority Login</h1>
  <p class="subtitle">Access the civic management dashboard</p>

  <div class="notice">
    ⚠️ This portal is restricted to authorized government officials only. Admin accounts are provisioned by the system administrator.
  </div>

  <div class="alert alert-error" id="errorAlert"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">Official Email</label>
      <input type="email" id="email" placeholder="official@civicconnect.app" required autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn" id="submitBtn">Sign In to Dashboard</button>
  </form>

  <div class="demo-creds">
    <strong>Demo Credentials:</strong>
    Email: admin@civicconnect.app &nbsp;|&nbsp; Password: admin123
  </div>
</div>

<script>
const token = localStorage.getItem('token');
const role = localStorage.getItem('role');
if (token && role === 'admin') window.location.href = '/admin/dashboard.html';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorAlert = document.getElementById('errorAlert');
  const submitBtn = document.getElementById('submitBtn');
  errorAlert.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span>Signing in...';

  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');

    localStorage.setItem('token', data.token);
    localStorage.setItem('role', data.role);
    localStorage.setItem('name', data.name);
    localStorage.setItem('userId', data.id);
    window.location.href = '/admin/dashboard.html';
  } catch (err) {
    errorAlert.textContent = err.message;
    errorAlert.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign In to Dashboard';
  }
});
</script>
</body>
</html>
